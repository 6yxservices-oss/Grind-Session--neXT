<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HVU Insider - Football Scout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--navy:#041E42;--white:#FFFFFF;--gold:#CFB991;--dark:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e293b;--text:#e2e8f0;--muted:#94a3b8;--green:#22c55e;--blue:#3b82f6;--yellow:#eab308;--orange:#f97316;--red:#ef4444;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--dark);color:var(--text);min-height:100vh;}
a{color:var(--gold);text-decoration:none;}

.header{background:var(--navy);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid var(--gold);position:sticky;top:0;z-index:100;}
.header h1{font-size:1.3rem;color:var(--white);letter-spacing:1px;}
.header h1 span{color:var(--gold);}
.header-sub{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;}

.nav{background:#0d1525;display:flex;overflow-x:auto;border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:99;}
.nav button{background:none;border:none;color:var(--muted);padding:12px 18px;font-size:0.82rem;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;}
.nav button:hover{color:var(--white);}
.nav button.active{color:var(--gold);border-bottom-color:var(--gold);}

.content{max-width:1200px;margin:0 auto;padding:16px;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center;}
.stat-card .num{font-size:1.8rem;font-weight:700;color:var(--gold);}
.stat-card .label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;margin-top:4px;}

.section{margin-bottom:24px;}
.section-title{font-size:1rem;font-weight:600;color:var(--white);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::before{content:'';width:3px;height:18px;background:var(--gold);border-radius:2px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--gold);transform:translateY(-1px);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.card-name{font-weight:600;color:var(--white);font-size:0.95rem;}
.card-sub{font-size:0.78rem;color:var(--muted);}
.card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.7rem;font-weight:600;}
.badge-navy{background:var(--navy);color:var(--white);}
.badge-gold{background:rgba(207,185,145,0.2);color:var(--gold);border:1px solid rgba(207,185,145,0.3);}
.stars{color:var(--gold);font-size:0.85rem;letter-spacing:1px;}

.grade{display:inline-block;padding:2px 10px;border-radius:4px;font-size:0.75rem;font-weight:700;}
.grade-aplus{background:rgba(34,197,94,0.2);color:var(--green);border:1px solid rgba(34,197,94,0.3);}
.grade-a{background:rgba(59,130,246,0.2);color:var(--blue);border:1px solid rgba(59,130,246,0.3);}
.grade-aminus{background:rgba(59,130,246,0.15);color:#60a5fa;border:1px solid rgba(59,130,246,0.2);}
.grade-bplus{background:rgba(234,179,8,0.2);color:var(--yellow);border:1px solid rgba(234,179,8,0.3);}
.grade-b{background:rgba(234,179,8,0.15);color:#facc15;border:1px solid rgba(234,179,8,0.2);}
.grade-c{background:rgba(249,115,22,0.2);color:var(--orange);border:1px solid rgba(249,115,22,0.3);}

.filters{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filters select{background:var(--card);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:6px;font-size:0.82rem;cursor:pointer;}
.filters select:focus{outline:none;border-color:var(--gold);}

.game-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
.game-card .teams{display:flex;justify-content:space-between;align-items:center;gap:12px;}
.game-card .team-name{font-weight:600;font-size:0.95rem;flex:1;}
.game-card .team-name.away{text-align:right;}
.game-card .score{font-size:1.5rem;font-weight:700;color:var(--gold);min-width:35px;text-align:center;}
.game-card .vs{color:var(--muted);font-size:0.8rem;padding:0 8px;}
.game-card .game-info{font-size:0.75rem;color:var(--muted);margin-top:8px;text-align:center;}
.game-status{font-size:0.7rem;font-weight:600;padding:2px 8px;border-radius:4px;}
.status-final{background:rgba(34,197,94,0.2);color:var(--green);}
.status-scheduled{background:rgba(59,130,246,0.2);color:var(--blue);}

.feed-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;}
.feed-card .author{font-weight:600;color:var(--gold);font-size:0.85rem;}
.feed-card .post-type{font-size:0.65rem;text-transform:uppercase;font-weight:700;padding:2px 6px;border-radius:3px;margin-left:8px;}
.type-intel{background:rgba(59,130,246,0.2);color:var(--blue);}
.type-commit{background:rgba(34,197,94,0.2);color:var(--green);}
.type-challenge{background:rgba(207,185,145,0.2);color:var(--gold);}
.type-update{background:rgba(148,163,184,0.2);color:var(--muted);}
.feed-card .body{font-size:0.88rem;line-height:1.5;margin-top:8px;color:var(--text);}
.feed-card .meta{display:flex;gap:16px;margin-top:10px;font-size:0.75rem;color:var(--muted);}

.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;overflow-y:auto;display:none;}
.detail-overlay.show{display:block;}
.detail-panel{max-width:700px;margin:20px auto;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;position:relative;}
.detail-close{position:absolute;top:12px;right:16px;background:none;border:none;color:var(--muted);font-size:1.5rem;cursor:pointer;}
.detail-close:hover{color:var(--white);}
.detail-name{font-size:1.5rem;font-weight:700;color:var(--white);}
.detail-pos{color:var(--gold);font-size:0.9rem;margin-top:2px;}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin:16px 0;}
.detail-stat{background:var(--card2);border-radius:8px;padding:10px;text-align:center;}
.detail-stat .val{font-size:1.1rem;font-weight:600;color:var(--white);}
.detail-stat .lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;margin-top:2px;}
.detail-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
.detail-section h3{font-size:0.9rem;color:var(--gold);margin-bottom:10px;}
.detail-section p{font-size:0.85rem;line-height:1.5;color:var(--text);}
.detail-section .label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;margin-bottom:2px;}

.portal-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:10px;}
.likelihood-bar{height:6px;background:#1e293b;border-radius:3px;margin-top:8px;overflow:hidden;}
.likelihood-fill{height:100%;border-radius:3px;transition:width .3s;}

.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;}
.team-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;}
.team-card .name{font-weight:600;color:var(--white);font-size:1rem;}
.team-card .conf{color:var(--gold);font-size:0.8rem;margin-top:2px;}
.team-card .loc{color:var(--muted);font-size:0.78rem;margin-top:4px;}

@media(max-width:600px){
  .header h1{font-size:1rem;}
  .nav button{padding:10px 12px;font-size:0.75rem;}
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .detail-panel{margin:10px;padding:16px;}
  .content{padding:12px;}
}
</style>
</head>

function getTeam(id){return DATA.teams.find(function(t){return t.id===id});}
function getPlayer(id){return DATA.players.find(function(p){return p.id===id});}
function getMetrics(pid){return DATA.football_metrics.find(function(m){return m.player_id===pid});}
function getReport(pid){return DATA.scouting_reports.find(function(r){return r.player_id===pid});}
function getProjection(pid){return DATA.nfl_projections.find(function(n){return n.player_id===pid});}
function getScholastic(pid){return DATA.scholastic_data.find(function(s){return s.player_id===pid});}

function stars(n){
  var s='';
  for(var i=0;i<5;i++) s+=i<n?'\u2605':'\u2606';
  return '<span class="stars">'+s+'</span>';
}

function gradeClass(g){
  if(!g) return '';
  var gl=g.replace(/[^A-Za-z+\-]/g,'').toUpperCase();
  if(gl==='A+') return 'grade-aplus';
  if(gl==='A') return 'grade-a';
  if(gl==='A-') return 'grade-aminus';
  if(gl==='B+') return 'grade-bplus';
  if(gl==='B') return 'grade-b';
  return 'grade-c';
}

function gradeBadge(g){
  if(!g) return '';
  return '<span class="grade '+gradeClass(g)+'">'+g+'</span>';
}

function money(n){
  if(!n) return 'N/A';
  if(n>=1000000) return '$'+(n/1000000).toFixed(0)+'M';
  if(n>=1000) return '$'+(n/1000).toFixed(0)+'K';
  return '$'+n;
}

function fmtDate(d){
  if(!d) return '';
  var dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function timeAgo(d){
  if(!d) return '';
  var now=new Date('2026-03-11T12:00:00Z');
  var dt=new Date(d);
  var diff=Math.floor((now-dt)/(1000*60*60*24));
  if(diff<=0) return 'Today';
  if(diff===1) return '1 day ago';
  return diff+' days ago';
}

function postTypeClass(t){
  var m={'intel':'type-intel','commit':'type-commit','challenge':'type-challenge','update':'type-update'};
  return m[t]||'type-update';
}

function likelihoodColor(pct){
  if(pct>=75) return 'var(--red)';
  if(pct>=50) return 'var(--orange)';
  return 'var(--yellow)';
}

function renderDashboard(){
  var el=document.getElementById('tab-dashboard');
  var topProspects=DATA.players.filter(function(p){return p.star_rating>=4;}).sort(function(a,b){
    if(b.star_rating!==a.star_rating) return b.star_rating-a.star_rating;
    return (a.ranking||999)-(b.ranking||999);
  }).slice(0,5);
  var upcomingGames=DATA.games.filter(function(g){return g.status==='Scheduled';});
  var recentPosts=DATA.feed_posts.slice(0,3);

  var h='<div class="stats-row">';
  h+='<div class="stat-card"><div class="num">'+DATA.players.length+'</div><div class="label">Players</div></div>';
  h+='<div class="stat-card"><div class="num">'+DATA.teams.length+'</div><div class="label">Teams</div></div>';
  h+='<div class="stat-card"><div class="num">'+DATA.games.length+'</div><div class="label">Games</div></div>';
  h+='<div class="stat-card"><div class="num">'+DATA.scouting_reports.length+'</div><div class="label">Reports</div></div>';
  h+='</div>';

  h+='<div class="section"><div class="section-title">Top Prospects</div>';
  topProspects.forEach(function(p){
    var report=getReport(p.id);
    h+='<div class="card" onclick="showPlayer('+p.id+')">';
    h+='<div class="card-header"><div><div class="card-name">'+p.first_name+' '+p.last_name+'</div>';
    h+='<div class="card-sub">'+p.position+' | '+p.height+' / '+p.weight+' lbs | Class '+p.class_year+'</div></div>';
    h+='<div>'+stars(p.star_rating)+'</div></div>';
    h+='<div class="card-meta">';
    if(p.ranking) h+='<span class="badge badge-navy">#'+p.ranking+' National</span>';
    h+='<span class="badge badge-gold">'+p.status+'</span>';
    if(report) h+=gradeBadge(report.overall_grade);
    h+='</div></div>';
  });
  h+='</div>';

  if(upcomingGames.length){
    h+='<div class="section"><div class="section-title">Upcoming Games</div>';
    upcomingGames.forEach(function(g){
      var home=getTeam(g.home_team_id);
      var away=getTeam(g.away_team_id);
      h+='<div class="game-card"><div class="teams">';
      h+='<div class="team-name">'+(home?home.name:'TBD')+'</div>';
      h+='<div class="vs">vs</div>';
      h+='<div class="team-name away">'+(away?away.name:'TBD')+'</div>';
      h+='</div><div class="game-info">Week '+g.week_number+' | '+fmtDate(g.game_date)+' | '+g.venue+', '+g.city+', '+g.state;
      h+=' <span class="game-status status-scheduled">'+g.status+'</span></div></div>';
    });
    h+='</div>';
  }

  h+='<div class="section"><div class="section-title">Recent Intel</div>';
  recentPosts.forEach(function(fp){
    h+='<div class="feed-card"><div><span class="author">'+fp.author+'</span>';
    h+='<span class="post-type '+postTypeClass(fp.post_type)+'">'+fp.post_type+'</span></div>';
    h+='<div class="body">'+fp.content.replace(/\n/g,'<br>')+'</div>';
    h+='<div class="meta"><span>'+timeAgo(fp.created_at)+'</span><span>'+fp.likes_count+' likes</span><span>'+fp.shares_count+' shares</span></div></div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

  classes.sort();

  var filtered=DATA.players.slice();
  if(playerPosFilter!=='All') filtered=filtered.filter(function(p){return p.position===playerPosFilter;});
  if(playerClassFilter!=='All') filtered=filtered.filter(function(p){return p.class_year===parseInt(playerClassFilter);});
  filtered.sort(function(a,b){
    if(b.star_rating!==a.star_rating) return b.star_rating-a.star_rating;
    return (a.ranking||999)-(b.ranking||999);
  });

  var h='<div class="filters">';
  h+='<select id="posFilter"><option value="All">All Positions</option>';
  positions.forEach(function(pos){h+='<option value="'+pos+'"'+(playerPosFilter===pos?' selected':'')+'>'+pos+'</option>';});
  h+='</select>';
  h+='<select id="classFilter"><option value="All">All Classes</option>';
  classes.forEach(function(c){h+='<option value="'+c+'"'+(playerClassFilter===String(c)?' selected':'')+'>'+c+'</option>';});
  h+='</select></div>';

  h+='<div class="section-title">'+filtered.length+' Players</div>';

  filtered.forEach(function(p){
    var report=getReport(p.id);
    var team=p.team_id?getTeam(p.team_id):null;
    h+='<div class="card" onclick="showPlayer('+p.id+')">';
    h+='<div class="card-header"><div><div class="card-name">'+p.first_name+' '+p.last_name+'</div>';
    h+='<div class="card-sub">'+p.position+' | '+p.height+' / '+p.weight+' lbs | Class '+p.class_year;
    if(team) h+=' | '+team.name;
    h+='</div></div><div>'+stars(p.star_rating)+'</div></div>';
    h+='<div class="card-meta">';
    if(p.ranking) h+='<span class="badge badge-navy">#'+p.ranking+'</span>';
    h+='<span class="badge badge-gold">'+p.status+'</span>';
    if(p.committed_to) h+='<span class="badge badge-navy">'+p.committed_to+'</span>';
    if(report) h+=gradeBadge(report.overall_grade);
    h+='<span class="badge badge-gold">NIL: '+money(p.nil_value)+'</span>';
    h+='</div></div>';
  });

  el.innerHTML=h;

  document.getElementById('posFilter').addEventListener('change',function(){
    playerPosFilter=this.value; renderPlayers();
  });
  document.getElementById('classFilter').addEventListener('change',function(){
    playerClassFilter=this.value; renderPlayers();
  });
}

/* ====== PLAYER DETAIL ====== */
function showPlayer(id){
  var p=getPlayer(id);
  if(!p) return;
  var m=getMetrics(id);
  var r=getReport(id);
  var proj=getProjection(id);
  var sch=getScholastic(id);
  var team=p.team_id?getTeam(p.team_id):null;
  var overlay=document.getElementById('detail-overlay');
  var panel=document.getElementById('detail-panel');

  var h='<button class="detail-close" onclick="closeDetail()">\u00d7</button>';
  h+='<div class="detail-name">'+p.first_name+' '+p.last_name+'</div>';
  h+='<div class="detail-pos">'+p.position+' | '+p.height+' / '+p.weight+' lbs | Class '+p.class_year+' | '+stars(p.star_rating)+'</div>';
  h+='<div style="margin-top:6px;font-size:0.82rem;color:var(--muted);">';
  h+=p.high_school+' | '+p.hometown+', '+p.state;
  if(team) h+=' | '+team.name;
  if(p.committed_to) h+=' | Committed: '+p.committed_to;
  h+='</div>';

  h+='<div class="detail-grid">';
  if(p.ranking) h+='<div class="detail-stat"><div class="val">#'+p.ranking+'</div><div class="lbl">National Rank</div></div>';
  h+='<div class="detail-stat"><div class="val">'+money(p.nil_value)+'</div><div class="lbl">NIL Value</div></div>';
  h+='<div class="detail-stat"><div class="val">'+p.status+'</div><div class="lbl">Status</div></div>';
  h+='</div>';

  if(r){
    h+='<div class="detail-section"><h3>Scouting Report \u2014 '+r.scout_name+'</h3>';
    h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;">';
    h+='<span style="font-size:0.75rem;color:var(--muted);">Overall:</span>'+gradeBadge(r.overall_grade);
    if(r.offensive_grade) h+=' <span style="font-size:0.75rem;color:var(--muted);">OFF:</span>'+gradeBadge(r.offensive_grade);
    if(r.defensive_grade) h+=' <span style="font-size:0.75rem;color:var(--muted);">DEF:</span>'+gradeBadge(r.defensive_grade);
    if(r.athleticism_grade) h+=' <span style="font-size:0.75rem;color:var(--muted);">ATH:</span>'+gradeBadge(r.athleticism_grade);
    if(r.football_iq_grade) h+=' <span style="font-size:0.75rem;color:var(--muted);">IQ:</span>'+gradeBadge(r.football_iq_grade);
    h+='</div>';
    h+='<div class="label">Strengths</div><p>'+r.strengths+'</p>';
    h+='<div class="label" style="margin-top:10px;">Weaknesses</div><p>'+r.weaknesses+'</p>';
    h+='<div class="label" style="margin-top:10px;">Notes</div><p>'+r.notes+'</p>';
    h+='<div class="label" style="margin-top:10px;">Projection</div><p>'+r.projection+'</p>';
    h+='<div class="label" style="margin-top:10px;">NFL Comparison</div><p>'+r.comparison+'</p>';
    h+='</div>';
  }

  if(m){
    h+='<div class="detail-section"><h3>Athletic Metrics</h3><div class="detail-grid">';
    h+='<div class="detail-stat"><div class="val">'+m.forty_yard+'</div><div class="lbl">40-Yard</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.top_speed_mph+'</div><div class="lbl">Top Speed (mph)</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.shuttle+'</div><div class="lbl">Shuttle</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.vertical_jump+'"</div><div class="lbl">Vertical</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.broad_jump+'"</div><div class="lbl">Broad Jump</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.bench_press_reps+'</div><div class="lbl">Bench Reps</div></div>';
    if(m.throw_velocity_mph) h+='<div class="detail-stat"><div class="val">'+m.throw_velocity_mph+'</div><div class="lbl">Throw Vel (mph)</div></div>';
    if(m.tackle_force_lbs) h+='<div class="detail-stat"><div class="val">'+m.tackle_force_lbs+'</div><div class="lbl">Tackle Force</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.wingspan+'</div><div class="lbl">Wingspan</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.hand_size+'"</div><div class="lbl">Hand Size</div></div>';
    h+='<div class="detail-stat"><div class="val">'+m.arm_length+'"</div><div class="lbl">Arm Length</div></div>';
    h+='</div></div>';
  }

  if(sch){
    h+='<div class="detail-section"><h3>Scholastic Data</h3><div class="detail-grid">';
    h+='<div class="detail-stat"><div class="val">'+sch.gpa+'</div><div class="lbl">GPA</div></div>';
    h+='<div class="detail-stat"><div class="val">'+sch.core_gpa+'</div><div class="lbl">Core GPA</div></div>';
    h+='<div class="detail-stat"><div class="val">'+sch.sat_score+'</div><div class="lbl">SAT</div></div>';
    h+='<div class="detail-stat"><div class="val">'+sch.act_score+'</div><div class="lbl">ACT</div></div>';
    h+='<div class="detail-stat"><div class="val">'+(sch.ncaa_eligible?'Yes':'No')+'</div><div class="lbl">NCAA Eligible</div></div>';
    h+='<div class="detail-stat"><div class="val">'+sch.intended_major+'</div><div class="lbl">Major</div></div>';
    h+='</div></div>';
  }

  if(proj){
    h+='<div class="detail-section"><h3>NFL Projection</h3><div class="detail-grid">';
    h+='<div class="detail-stat"><div class="val">'+proj.draft_probability+'%</div><div class="lbl">Draft Prob</div></div>';
    h+='<div class="detail-stat"><div class="val">Rd '+proj.projected_round+'</div><div class="lbl">Proj Round</div></div>';
    h+='<div class="detail-stat"><div class="val">#'+proj.projected_pick_range+'</div><div class="lbl">Pick Range</div></div>';
    h+='<div class="detail-stat"><div class="val">'+proj.projected_role+'</div><div class="lbl">Role</div></div>';
    h+='<div class="detail-stat"><div class="val">'+proj.player_archetype+'</div><div class="lbl">Archetype</div></div>';
    h+='<div class="detail-stat"><div class="val">'+proj.bust_probability+'%</div><div class="lbl">Bust Prob</div></div>';
    h+='<div class="detail-stat"><div class="val">'+proj.pro_bowl_probability+'%</div><div class="lbl">Pro Bowl Prob</div></div>';
    h+='<div class="detail-stat"><div class="val">'+money(proj.career_earnings_est)+'</div><div class="lbl">Career Earnings Est</div></div>';
    h+='</div>';
    h+='<div style="margin-top:10px;font-size:0.85rem;"><span style="color:var(--muted);">NFL Comp:</span> <span style="color:var(--white);">'+proj.nfl_comparison+' ('+proj.nfl_comp_similarity+'% match)</span></div>';
    h+='<div style="font-size:0.85rem;"><span style="color:var(--muted);">Secondary Comp:</span> <span style="color:var(--white);">'+proj.secondary_comparison+'</span></div>';
    h+='</div>';
  }

  panel.innerHTML=h;
  overlay.classList.add('show');
  document.body.style.overflow='hidden';
}

function closeDetail(){
  document.getElementById('detail-overlay').classList.remove('show');
  document.body.style.overflow='';
}

document.getElementById('detail-overlay').addEventListener('click',function(e){
  if(e.target===this) closeDetail();
});

/* ====== TEAMS ====== */
function renderTeams(){
  var el=document.getElementById('tab-teams');
  var h='<div class="section-title">'+DATA.teams.length+' Schools</div><div class="teams-grid">';
  DATA.teams.forEach(function(t){
    var playerCount=DATA.players.filter(function(p){return p.team_id===t.id;}).length;
    h+='<div class="team-card"><div class="name">'+t.name+'</div>';
    h+='<div class="conf">'+t.conference+'</div>';
    h+='<div class="loc">'+t.city+', '+t.state+'</div>';
    if(playerCount) h+='<div style="margin-top:6px;font-size:0.78rem;color:var(--gold);">'+playerCount+' player'+(playerCount>1?'s':'')+'</div>';
    h+='</div>';
  });
  h+='</div>';
  el.innerHTML=h;
}

/* ====== GAMES ====== */
function renderGames(){
  var el=document.getElementById('tab-games');
  var sorted=DATA.games.slice().sort(function(a,b){return a.week_number-b.week_number;});

  var finals=DATA.games.filter(function(g){return g.status==='Final';});
  var wins=0,losses=0;
  finals.forEach(function(g){
    var psuIsHome=g.home_team_id===1;
    var psuScore=psuIsHome?g.home_score:g.away_score;
    var oppScore=psuIsHome?g.away_score:g.home_score;
    if(psuScore>oppScore) wins++; else losses++;
  });

  var h='<div class="stats-row" style="margin-bottom:20px;">';
  h+='<div class="stat-card"><div class="num">'+wins+'-'+losses+'</div><div class="label">PSU Record</div></div>';
  h+='<div class="stat-card"><div class="num">'+finals.length+'</div><div class="label">Games Played</div></div>';
  h+='<div class="stat-card"><div class="num">'+(DATA.games.length-finals.length)+'</div><div class="label">Remaining</div></div>';
  h+='</div>';

  h+='<div class="section-title">Penn State 2025 Season Schedule</div>';

  sorted.forEach(function(g){
    var home=getTeam(g.home_team_id);
    var away=getTeam(g.away_team_id);
    var isFinal=g.status==='Final';
    var psuResult='';
    if(isFinal){
      var psuIsHome=g.home_team_id===1;
      var psuScore=psuIsHome?g.home_score:g.away_score;
      var oppScore=psuIsHome?g.away_score:g.home_score;
      psuResult=psuScore>oppScore?'W':'L';
    }

    h+='<div class="game-card">';
    h+='<div class="teams">';
    h+='<div class="team-name" style="'+(g.home_team_id===1?'color:var(--gold);':'')+'">'+(home?home.name:'TBD')+'</div>';
    if(isFinal){
      h+='<div class="score">'+g.home_score+'</div>';
      h+='<div style="color:var(--muted);font-size:0.8rem;">-</div>';
      h+='<div class="score">'+g.away_score+'</div>';
    } else {
      h+='<div class="vs">vs</div>';
    }
    h+='<div class="team-name away" style="'+(g.away_team_id===1?'color:var(--gold);':'')+'">'+(away?away.name:'TBD')+'</div>';
    h+='</div>';
    h+='<div class="game-info">';
    h+='Week '+g.week_number+' | '+fmtDate(g.game_date)+' | '+g.venue+', '+g.city+', '+g.state+' ';
    if(isFinal){
      h+='<span class="game-status status-final">'+g.status+(psuResult?' (PSU '+psuResult+')':'')+'</span>';
    } else {
      h+='<span class="game-status status-scheduled">'+g.status+'</span>';
    }
    h+='</div></div>';
  });

  el.innerHTML=h;
}

/* ====== REPORTS ====== */
function renderReports(){
  var el=document.getElementById('tab-reports');
  var h='<div class="section-title">'+DATA.scouting_reports.length+' Scouting Reports by Mike V</div>';

  DATA.scouting_reports.forEach(function(r){
    var p=getPlayer(r.player_id);
    if(!p) return;
    h+='<div class="card" onclick="showPlayer('+p.id+')">';
    h+='<div class="card-header"><div><div class="card-name">'+p.first_name+' '+p.last_name+'</div>';
    h+='<div class="card-sub">'+p.position+' | Class '+p.class_year+' | '+r.scout_name+'</div></div>';
    h+='<div>'+gradeBadge(r.overall_grade)+'</div></div>';
    h+='<div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;">';
    if(r.offensive_grade) h+='<span style="font-size:0.7rem;color:var(--muted);">OFF:</span>'+gradeBadge(r.offensive_grade);
    if(r.defensive_grade) h+='<span style="font-size:0.7rem;color:var(--muted);">DEF:</span>'+gradeBadge(r.defensive_grade);
    if(r.athleticism_grade) h+='<span style="font-size:0.7rem;color:var(--muted);">ATH:</span>'+gradeBadge(r.athleticism_grade);
    if(r.football_iq_grade) h+='<span style="font-size:0.7rem;color:var(--muted);">IQ:</span>'+gradeBadge(r.football_iq_grade);
    h+='</div>';
    h+='<p style="font-size:0.82rem;color:var(--text);line-height:1.4;margin-top:6px;">'+r.strengths+'</p>';
    h+='<div style="margin-top:8px;font-size:0.78rem;"><span style="color:var(--muted);">Projection:</span> <span style="color:var(--gold);">'+r.projection+'</span>';
    h+=' | <span style="color:var(--muted);">Comp:</span> <span style="color:var(--white);">'+r.comparison+'</span></div>';
    h+='</div>';
  });

  el.innerHTML=h;
}

/* ====== TRANSFER PORTAL ====== */
function renderPortal(){
  var el=document.getElementById('tab-portal');
  var h='<div class="section-title">Transfer Portal Watch List</div>';

  DATA.transfer_portal.forEach(function(tp){
    var p=getPlayer(tp.player_id);
    if(!p) return;
    var team=p.team_id?getTeam(p.team_id):null;
    var color=likelihoodColor(tp.transfer_likelihood);

    h+='<div class="portal-card" onclick="showPlayer('+p.id+')" style="cursor:pointer;">';
    h+='<div class="card-header"><div><div class="card-name">'+p.first_name+' '+p.last_name+'</div>';
    h+='<div class="card-sub">'+p.position+' | '+(team?team.name:'Unknown')+' | Class '+p.class_year+'</div></div>';
    h+='<div style="text-align:right;"><div style="font-size:1.3rem;font-weight:700;color:'+color+';">'+tp.transfer_likelihood+'%</div>';
    h+='<div style="font-size:0.68rem;color:var(--muted);">Transfer Likelihood</div></div></div>';
    h+='<div class="likelihood-bar"><div class="likelihood-fill" style="width:'+tp.transfer_likelihood+'%;background:'+color+';"></div></div>';
    h+='<p style="font-size:0.82rem;color:var(--text);margin-top:10px;">'+tp.reason+'</p>';
    h+='<div class="card-meta" style="margin-top:8px;">';
    h+='<span class="badge badge-'+(tp.status==='In Portal'?'gold':'navy')+'">'+tp.status+'</span>';
    h+='<span class="badge badge-navy">Playing Time: '+tp.current_playing_time_pct+'%</span>';
    h+='<span class="badge badge-gold">NIL Increase: +'+tp.projected_nil_increase+'%</span>';
    h+='</div></div>';
  });

  el.innerHTML=h;
}

/* ====== FEED ====== */
function renderFeed(){
  var el=document.getElementById('tab-feed');
  var h='<div class="section-title">Coach Mike V Intel Feed</div>';

  DATA.feed_posts.forEach(function(fp){
    h+='<div class="feed-card">';
    h+='<div><span class="author">'+fp.author+'</span>';
    h+='<span class="post-type '+postTypeClass(fp.post_type)+'">'+fp.post_type+'</span></div>';
    h+='<div class="body">'+fp.content.replace(/\n/g,'<br>')+'</div>';
    h+='<div class="meta">';
    h+='<span>'+timeAgo(fp.created_at)+'</span>';
    h+='<span>'+fp.likes_count+' likes</span>';
    h+='<span>'+fp.shares_count+' shares</span>';
    if(fp.player_id){
      var pl=getPlayer(fp.player_id);
      if(pl) h+='<span style="color:var(--gold);cursor:pointer;" onclick="showPlayer('+pl.id+')">View: '+pl.first_name+' '+pl.last_name+'</span>';
    }
    h+='</div></div>';
  });

  el.innerHTML=h;
}

/* ====== INIT ====== */
renderDashboard();
renderPlayers();
renderTeams();
renderGames();
renderReports();
renderPortal();
renderFeed();

document.addEventListener('keydown',function(e){
  if(e.key==='Escape') closeDetail();
});
</script>
